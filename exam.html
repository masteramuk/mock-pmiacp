<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMI-ACP Exam</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero compact-hero">
        <div>
          <p class="eyebrow">Exam workspace</p>
          <h1>Exam Page</h1>
        </div>
        <div class="hero-badges">
          <a href="index.html" class="secondary-btn button-link" title="Back to home">Home</a>
          <a href="history.html" class="secondary-btn button-link" title="Open history">History</a>
        </div>
      </header>

      <main class="exam-layout">
        <aside class="card exam-sidebar">
          <div class="sidebar-block">
            <p id="progress-label" class="muted-text">Question 1 of 10</p>
            <h2>Exam in Progress</h2>
            <div class="pill-group">
              <span id="timer-label" class="pill">00:00</span>
              <span id="time-limit-pill" class="pill">Limit 00:00</span>
              <span id="difficulty-pill" class="pill">All difficulties</span>
              <span id="mode-pill" class="pill">Exam mode</span>
            </div>
          </div>

          <div class="sidebar-block">
            <h3>Progress</h3>
            <div id="exam-progress-summary" class="summary-box compact-summary"></div>
            <div id="question-palette" class="question-palette"></div>
          </div>
        </aside>

        <section class="card exam-main">
          <div class="question-meta">
            <span id="domain-label" class="tag"></span>
            <span id="question-type-label" class="tag"></span>
            <span id="difficulty-label" class="tag"></span>
          </div>
          <h2 id="question-text" class="question-text"></h2>
          <p id="question-help-text" class="muted-text"></p>
          <form id="question-form" class="options-list"></form>
          <div id="study-feedback" class="summary-box hidden"></div>
          <div class="action-bar action-bar-bottom">
            <button id="prev-btn" class="secondary-btn" type="button" title="Go to the previous question">Previous</button>
            <button id="next-btn" class="primary-btn" type="button" title="Go to the next question">Next</button>
            <button id="finish-btn" class="secondary-btn" type="button" title="Finish this exam and calculate the result">Finish Exam</button>
          </div>
        </section>
      </main>

      <footer class="footer-note">
        <p class="footer-title">Notice and License</p>
        <p>Copyright © Haszeli Ahmad. All rights reserved.</p>
        <p>AI-generated practice material only. Not official PMI exam content. Use with caution.</p>
      </footer>
    </div>

    <script src="question-bank.js"></script>
    <script src="core.js"></script>
    <script src="exam.js"></script>
  </body>
</html>
